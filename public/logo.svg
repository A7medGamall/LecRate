<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 48">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#818CF8"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>

  <!-- Brand Name: LecRate -->
  <text x="4" y="26"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="28" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#ffffff">Lec</tspan><tspan fill="url(#accentGrad)">Rate</tspan>
  </text>

  <!-- Stars row  -->
  <g transform="translate(4, 33) scale(0.55)">
    <polygon points="8,0 9.8,5.5 15.5,5.5 11,9 12.8,14.5 8,11 3.2,14.5 5,9 0.5,5.5 6.2,5.5"
             fill="url(#starGrad)"/>
    <polygon points="26,0 27.8,5.5 33.5,5.5 29,9 30.8,14.5 26,11 21.2,14.5 23,9 18.5,5.5 24.2,5.5"
             fill="url(#starGrad)"/>
    <polygon points="44,0 45.8,5.5 51.5,5.5 47,9 48.8,14.5 44,11 39.2,14.5 41,9 36.5,5.5 42.2,5.5"
             fill="none" stroke="url(#starGrad)" stroke-width="1.2" opacity="0.6"/>
    <clipPath id="halfClip">
      <rect x="36" y="0" width="8" height="15"/>
    </clipPath>
    <polygon points="44,0 45.8,5.5 51.5,5.5 47,9 48.8,14.5 44,11 39.2,14.5 41,9 36.5,5.5 42.2,5.5"
             fill="url(#starGrad)" clip-path="url(#halfClip)" opacity="0.6"/>
  </g>

  <!-- Slogan: beside the stars -->
  <text x="36" y="42"
        font-family="'Courier New', monospace"
        font-size="7.5" fill="#94A3B8" letter-spacing="1.6">
    RATE · SHARE · LEARN
  </text>
</svg>
